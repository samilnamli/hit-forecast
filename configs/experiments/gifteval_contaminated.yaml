# Contrast experiment (Exp 3): OLD leaking pool on the SAME GIFT-Eval configs.
# Compared against gifteval_main_clean, this quantifies how contamination
# collapses the routing signal (Phase-0) and inflates absolute metrics.
#
# Official GIFT-Eval leakage tags: Chronos / Chronos-Bolt / TimesFM-1.0|2.0 /
# Lag-Llama = Yes; Moirai = No. Current PyPI `timesfm` only ships the 2.5
# loader (which 404s on 1.0 weights), so we use a third Chronos leaker
# instead of TimesFM-1.0 — still 3/4 contaminated vs 1 clean.
defaults: _gifteval_base.yaml

name: gifteval_contaminated
cache_root: feature_cache/gifteval_contaminated

experts:
  - kind: chronos
    name: chronos-t5-small
    model_id: amazon/chronos-t5-small     # leakage = Yes
    dtype: bfloat16
    feature_source: auto
  - kind: chronos
    name: chronos-bolt-base
    model_id: amazon/chronos-bolt-base     # leakage = Yes
    dtype: bfloat16
    feature_source: stat
    stat_hidden: 96
  - kind: chronos
    name: chronos-t5-base
    model_id: amazon/chronos-t5-base       # leakage = Yes (TimesFM-1.0 stand-in)
    dtype: bfloat16
    feature_source: auto
    stat_hidden: 128
  - kind: moirai
    name: moirai-base
    model_id: Salesforce/moirai-1.1-R-base       # leakage = No
    feature_source: stat
    stat_hidden: 112
