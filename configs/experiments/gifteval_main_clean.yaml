# Main results (Exp 2): clean, DIVERSE expert pool on GIFT-Eval.
# Foundation models are all tagged testdata_leakage = No; the classical experts
# (theta / seasonal-naive / damped-drift) are decorrelated from the deep models,
# widening the per-window oracle gap so routing has real, learnable headroom.
# feature_source: auto = try the model's own encoder hidden states, fall back to
# rich stat patches; the cache also appends expert-specific forecast tokens.
defaults: _gifteval_base.yaml

name: gifteval_main_clean
cache_root: feature_cache/gifteval_main_clean

experts:
  - kind: chronos
    name: chronos-2
    model_id: amazon/chronos-2
    dtype: float32                # GiftEval / Chronos-2 recommended dtype
    feature_source: auto          # encoder hook with rich-stat fallback
  - kind: moirai
    name: moirai-base
    model_id: Salesforce/moirai-1.1-R-base
    feature_source: auto
    stat_hidden: 96
  - kind: timesfm
    name: timesfm-2.5
    model_id: google/timesfm-2.5-200m-pytorch
    feature_source: stat
    # Initial compile size; adapter recompiles to patch-aligned actual L per batch.
    context_length: 128
    max_horizon: 256
    per_core_batch_size: 64
    infer_is_positive: true
    stat_hidden: 128
  - kind: tirex
    name: tirex
    model_id: NX-AI/TiRex
    feature_source: stat
    stat_hidden: 112
  - kind: theta
    name: theta
    hidden: 64
  - kind: snaive
    name: snaive
    hidden: 56
  - kind: drift
    name: drift
    hidden: 48
